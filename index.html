<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disney & Pixar Canon Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c26; --border:#2a2a3a;
    --gold:#f5c842; --gold-dim:#a88a20;
    --pixar:#00b4e6; --pixar-dim:#0077a0;
    --text:#e8e6f0; --text-muted:#6b6880; --text-dim:#3d3b4f;
    --next-glow:0 0 30px rgba(245,200,66,.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 0%,#1a1030 0%,transparent 60%),
                     radial-gradient(ellipse at 80% 100%,#0d1a2e 0%,transparent 60%);}

  header{text-align:center;padding:3rem 2rem 2rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
  header::before{content:'✦';position:absolute;font-size:400px;color:#ffffff04;top:-120px;left:50%;transform:translateX(-50%);pointer-events:none;}
  header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;letter-spacing:-.02em;
    background:linear-gradient(135deg,#fff 0%,var(--gold) 60%,#fff8d6 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
  header p{color:var(--text-muted);margin-top:.5rem;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;}
  .legend{display:flex;justify-content:center;gap:1.5rem;margin-top:1.25rem;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--text-muted);letter-spacing:.05em;}
  .legend-icon{width:20px;height:20px;flex-shrink:0;}

  .progress-section{max-width:960px;margin:2rem auto;padding:0 1.5rem;}
  .progress-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
  @media(max-width:600px){.progress-row{grid-template-columns:1fr;}}
  .progress-main{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.8rem;}
  .progress-main.disney-card{border-color:#f5c84220;} .progress-main.pixar-card{border-color:#00b4e620;}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.75rem;}
  .progress-label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);}
  .progress-percent{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;}
  .disney-pct{color:var(--gold);} .pixar-pct{color:var(--pixar);}
  .progress-count{font-size:.8rem;color:var(--text-muted);}
  .progress-bar-wrap{background:var(--surface2);border-radius:100px;height:7px;overflow:hidden;}
  .progress-bar-fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .disney-fill{background:linear-gradient(90deg,var(--gold-dim),var(--gold));}
  .pixar-fill{background:linear-gradient(90deg,var(--pixar-dim),var(--pixar));}

  .next-up{background:var(--surface);border:1px solid var(--gold-dim);border-radius:16px;
    padding:1.2rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;box-shadow:var(--next-glow);}
  .next-up-badge{background:var(--gold);color:#000;font-size:.65rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;padding:.3rem .7rem;border-radius:100px;white-space:nowrap;flex-shrink:0;}
  .next-up-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;}
  .next-up-title small{display:block;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:300;font-style:italic;color:var(--text-muted);margin-top:.1rem;}
  .next-up-meta{margin-left:auto;text-align:right;flex-shrink:0;}
  .next-up-year{font-size:.85rem;color:var(--text-muted);display:block;}
  .next-up-studio{font-size:.7rem;margin-top:.2rem;display:block;}

  .era-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.75rem;margin-bottom:2rem;}
  .era-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;}
  .era-stat-name{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .era-stat-count{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;}
  .era-stat-count span{font-size:.8rem;color:var(--text-muted);font-family:'DM Sans',sans-serif;}
  .era-mini-bar{margin-top:.5rem;background:var(--surface2);border-radius:100px;height:4px;overflow:hidden;}
  .era-mini-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:100px;transition:width .5s ease;}

  .controls{max-width:960px;margin:1.75rem auto 1rem;padding:0 1.5rem;display:flex;align-items:center;justify-content:flex-end;gap:1rem;}
  .stats-btn{background:none;border:1px solid var(--border);border-radius:100px;
    color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.8rem;
    padding:.35rem .9rem;cursor:pointer;letter-spacing:.04em;transition:color .2s,border-color .2s;}
  .stats-btn:hover{color:var(--text);border-color:var(--gold-dim);}
  .toggle-seen{display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.8rem;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;user-select:none;transition:color .2s;}
  .toggle-seen:hover{color:var(--text);}
  .toggle-switch{width:36px;height:20px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;position:relative;transition:background .2s,border-color .2s;}
  .toggle-switch::after{content:'';position:absolute;width:14px;height:14px;background:var(--text-muted);border-radius:50%;top:2px;left:2px;transition:transform .2s,background .2s;}
  .toggle-seen.active .toggle-switch{background:var(--gold-dim);border-color:var(--gold-dim);}
  .toggle-seen.active .toggle-switch::after{transform:translateX(16px);background:var(--gold);}

  .main{max-width:960px;margin:0 auto;padding:0 1.5rem 4rem;}
  .era-section{margin-bottom:3rem;}
  .era-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
  .era-emoji{font-size:1.3rem;} .era-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;}
  .era-years{font-size:.75rem;color:var(--text-muted);letter-spacing:.08em;margin-left:auto;}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem;}

  .movie-card{background:var(--surface);border-radius:12px;overflow:hidden;cursor:pointer;
    transition:transform .2s,box-shadow .2s;position:relative;border:2px solid transparent;}
  .movie-card.disney{border-color:#f5c84235;} .movie-card.pixar{border-color:#00b4e635;}
  .movie-card:hover{transform:translateY(-3px);}
  .movie-card.disney:hover{border-color:#f5c84275;box-shadow:0 8px 30px rgba(245,200,66,.12);}
  .movie-card.pixar:hover{border-color:#00b4e675;box-shadow:0 8px 30px rgba(0,180,230,.12);}
  .movie-card.seen{display:none;}
  .movie-card.seen.show-seen{display:block;opacity:.38;filter:grayscale(.85);}
  .movie-card.seen.show-seen:hover{opacity:.58;}
  .movie-card.seen.show-seen .card-title{text-decoration:line-through;text-decoration-color:var(--text-dim);}
  .movie-card.skipped{display:none;}
  .movie-card.skipped.show-seen{display:block;opacity:.35;filter:grayscale(.6);}
  .movie-card.skipped.show-seen:hover{opacity:.52;}
  .movie-card.skipped.show-seen.disney{border-style:dashed;border-color:#f5c84240;}
  .movie-card.skipped.show-seen.pixar{border-style:dashed;border-color:#00b4e640;}

  .studio-icon{position:absolute;top:7px;right:7px;width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;z-index:2;padding:5px;
    backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.15);}
  .studio-icon.disney{background:rgba(245,200,66,.92);}
  .studio-icon.pixar{background:rgba(0,180,230,.92);}

  .card-poster-wrap{width:100%;aspect-ratio:2/3;position:relative;background:var(--surface2);overflow:hidden;}
  .poster-skeleton{position:absolute;inset:0;
    background:linear-gradient(90deg,var(--surface2) 25%,#22222f 50%,var(--surface2) 75%);
    background-size:200% 100%;animation:shimmer 1.5s infinite;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .poster-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:.35rem;color:var(--text-dim);font-size:2rem;pointer-events:none;}
  .poster-placeholder span{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);}
  .card-poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;display:block;}
  .card-poster.loaded{opacity:1;}

  .card-body{padding:.75rem;display:flex;flex-direction:column;justify-content:space-between;min-height:7.5rem;}
  .card-body-text{flex:1;}
  .card-title{font-family:'Playfair Display',serif;font-size:.85rem;font-weight:700;line-height:1.25;margin-bottom:.2rem;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-title-pt{font-size:.7rem;color:var(--text-muted);font-style:italic;line-height:1.3;margin-bottom:.4rem;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
  .card-year{font-size:.7rem;color:var(--text-dim);margin-top:.3rem;margin-bottom:.6rem;}
  .card-actions{display:flex;align-items:center;justify-content:space-between;gap:.4rem;}
  .card-seen-btn{display:flex;align-items:center;gap:.4rem;cursor:pointer;flex:1;}
  .checkbox-box{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;flex-shrink:0;}
  .movie-card.disney.seen .checkbox-box{background:var(--gold-dim);border-color:var(--gold-dim);}
  .movie-card.pixar.seen  .checkbox-box{background:var(--pixar-dim);border-color:var(--pixar-dim);}
  .checkbox-box svg{opacity:0;transition:opacity .15s;}
  .movie-card.seen .checkbox-box svg{opacity:1;}
  .checkbox-label{font-size:.68rem;color:var(--text-muted);}
  .movie-card.disney.seen .checkbox-label{color:var(--gold-dim);text-decoration:line-through;}
  .movie-card.pixar.seen  .checkbox-label{color:var(--pixar-dim);text-decoration:line-through;}
  .card-info-btn{width:24px;height:24px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    font-size:.7rem;color:var(--text-muted);transition:background .15s,border-color .15s,color .15s;}
  .card-info-btn:hover{background:var(--border);color:var(--text);}
  .card-skip-btn{width:24px;height:24px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    font-size:.72rem;color:var(--text-muted);transition:background .15s,border-color .15s,color .15s;}
  .card-skip-btn:hover{background:#3d3050;border-color:#6b5090;color:#b09fd0;}
  .movie-card.skipped .card-skip-btn{background:#3d305088;border-color:#6b509088;color:#b09fd0;}
  .movie-card.skipped .checkbox-label{color:var(--text-dim);}

  .era-all-seen{text-align:center;color:var(--text-dim);font-size:.8rem;letter-spacing:.08em;
    text-transform:uppercase;padding:1.5rem;border:1px dashed var(--border);border-radius:12px;display:none;}

  .upcoming-section{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);}
  .upcoming-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--text-muted);margin-bottom:1rem;}
  .upcoming-grid{display:flex;gap:.75rem;flex-wrap:wrap;}
  .upcoming-chip{border-radius:100px;padding:.4rem 1rem;font-size:.78rem;display:flex;align-items:center;gap:.5rem;}
  .upcoming-chip.disney{background:#f5c84210;border:1px solid #f5c84230;color:var(--text-muted);}
  .upcoming-chip.pixar{background:#00b4e610;border:1px solid #00b4e630;color:var(--text-muted);}
  .upcoming-chip strong{font-family:'Playfair Display',serif;color:var(--text);}
  .chip-badge{font-size:.6rem;font-weight:700;padding:.15rem .4rem;border-radius:100px;}
  .upcoming-chip.disney .chip-badge{background:var(--gold);color:#000;}
  .upcoming-chip.pixar  .chip-badge{background:var(--pixar);color:#000;}

  /* ── MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);
    z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;
    opacity:0;pointer-events:none;transition:opacity .25s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border-radius:20px;width:100%;max-width:540px;
    border:1px solid var(--border);overflow:hidden;
    transform:translateY(24px) scale(.96);transition:transform .28s cubic-bezier(.4,0,.2,1);
    max-height:92vh;overflow-y:auto;}
  .modal-overlay.open .modal{transform:none;}
  .modal.disney-modal{border-color:#f5c84240;}
  .modal.pixar-modal{border-color:#00b4e640;}

  .modal-top{display:flex;position:relative;}
  .modal-poster{width:175px;min-width:175px;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--surface2);}
  .modal-poster-ph{width:175px;min-width:175px;aspect-ratio:2/3;background:var(--surface2);
    display:none;align-items:center;justify-content:center;font-size:3rem;color:var(--text-dim);}

  .modal-info{flex:1;padding:1.4rem 1.4rem 1.4rem 1.2rem;display:flex;flex-direction:column;gap:.8rem;min-width:0;}

  .modal-studio-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.63rem;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;padding:.25rem .7rem;border-radius:100px;width:fit-content;}
  .modal-studio-badge.disney{background:#f5c84218;color:var(--gold);border:1px solid #f5c84235;}
  .modal-studio-badge.pixar{background:#00b4e618;color:var(--pixar);border:1px solid #00b4e635;}
  .modal-studio-badge svg{width:13px;height:13px;flex-shrink:0;}

  .modal-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:900;line-height:1.2;}
  .modal-title-pt{font-size:.78rem;color:var(--text-muted);font-style:italic;margin-top:.1rem;}

  .modal-tags{display:flex;gap:.4rem;flex-wrap:wrap;}
  .modal-tag{font-size:.68rem;color:var(--text-muted);background:var(--surface2);
    padding:.2rem .6rem;border-radius:100px;display:flex;align-items:center;gap:.3rem;}

  /* SCORES */
  .modal-scores-wrap{display:flex;flex-direction:column;gap:.4rem;}
  .scores-label{font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);}
  .scores-row{display:flex;gap:.45rem;flex-wrap:wrap;}
  .score-pill{display:flex;align-items:center;gap:.35rem;padding:.3rem .65rem;border-radius:100px;font-size:.76rem;font-weight:600;white-space:nowrap;}
  .score-pill.imdb{background:#f5c84215;border:1px solid #f5c84330;color:var(--gold);}
  .score-pill.rtc{background:#e8502515;border:1px solid #e8502530;color:#e87050;}
  .score-pill.rta{background:#2ec87515;border:1px solid #2ec87530;color:#2ec875;}
  .score-pill .si{font-size:.85rem;}
  .no-scores{font-size:.74rem;color:var(--text-dim);font-style:italic;}

  .modal-actions{padding:1rem 1.4rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:.75rem;}
  .modal-seen-btn{flex:1;padding:.7rem 1rem;border-radius:10px;border:none;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;transition:all .15s;}
  .modal-seen-btn.not-seen{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
  .modal-seen-btn.not-seen:hover{background:var(--border);color:var(--text);}
  .modal-seen-btn.is-seen.disney{background:var(--gold-dim);color:#000;}
  .modal-seen-btn.is-seen.pixar{background:var(--pixar-dim);color:#000;}
  .modal-skip-btn{padding:.7rem 1rem;border-radius:10px;border:1px solid var(--border);cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;transition:all .15s;
    background:var(--surface2);color:var(--text-muted);white-space:nowrap;}
  .modal-skip-btn:hover{background:#3d3050;border-color:#6b5090;color:#b09fd0;}
  .modal-skip-btn.is-skipped{background:#3d305088;border-color:#6b509088;color:#b09fd0;}
  .modal-close{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);
    cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);
    font-size:1.1rem;transition:all .15s;flex-shrink:0;}
  .modal-close:hover{background:var(--border);color:var(--text);}

  .scores-source{font-size:.58rem;color:var(--text-dim);margin-top:.2rem;}

  @media(max-width:480px){
    .modal-poster,.modal-poster-ph{width:130px;min-width:130px;}
    .modal-title{font-size:1.05rem;}
    .modal-info{padding:1rem;}
  }

  /* ── SCROLL-TO-NEXT ── */
  .next-up{cursor:pointer;}
  .next-up:hover .next-up-badge{background:var(--gold-dim);}

  /* ── TOAST ── */
  .toast-container{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);z-index:2000;
    display:flex;flex-direction:column;align-items:center;gap:.5rem;pointer-events:none;}
  .toast{background:linear-gradient(135deg,#1a1208,#2a1f06);
    border:1px solid var(--gold-dim);border-radius:100px;
    padding:.65rem 1.4rem;display:flex;align-items:center;gap:.6rem;
    box-shadow:0 4px 24px rgba(245,200,66,.2);
    animation:toast-in .35s cubic-bezier(.34,1.56,.64,1) forwards;
    font-size:.85rem;color:var(--gold);white-space:nowrap;}
  .toast.toast-out{animation:toast-out .3s ease forwards;}
  .toast-icon{font-size:1.1rem;}
  @keyframes toast-in{from{opacity:0;transform:translateY(-12px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes toast-out{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-8px) scale(.95)}}

  /* ── DATE WATCHED in modal ── */
  .modal-date-watched{font-size:.7rem;color:var(--text-muted);margin-top:.1rem;font-style:italic;}
</style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<header>
  <h1>Disney & Pixar Tracker</h1>
  <p id="header-sub">— filmes · tracker de progresso</p>

const TMDB_KEY    = '15d2ea6d0dc1d476efbca3eba2b9bbfb';
const TMDB_SEARCH = 'https://api.themoviedb.org/3/search/movie';
const TMDB_IMG_SM = 'https://image.tmdb.org/t/p/w342';
const TMDB_IMG_LG = 'https://image.tmdb.org/t/p/w500';
const _posterCache = JSON.parse(sessionStorage.getItem('dp-posters')||'{}');
function savePCache(){try{sessionStorage.setItem('dp-posters',JSON.stringify(_posterCache));}catch(e){}}

const SEARCH_OVERRIDE={
  d3:{title:"Fantasia",year:1940},d6:{title:"Saludos Amigos",year:1943},
  d8:{title:"Make Mine Music",year:1946},d9:{title:"Fun and Fancy Free",year:1947},
  d10:{title:"Melody Time",year:1948},d11:{title:"The Adventures of Ichabod and Mr. Toad",year:1949},
  d17:{title:"101 Dalmatians",year:1961},d22:{title:"The Many Adventures of Winnie the Pooh",year:1977},
  d38:{title:"Fantasia 2000",year:1999},d39:{title:"Dinosaur",year:2000},p9:{title:"WALL-E",year:2008},
};

async function searchTMDB(filmId,title,year){
  if(_posterCache[filmId]!==undefined)return _posterCache[filmId];
  const ov=SEARCH_OVERRIDE[filmId];
  const t=ov?ov.title:title,y=ov?ov.year:year;
  try{
    const r=await fetch(`${TMDB_SEARCH}?api_key=${TMDB_KEY}&query=${encodeURIComponent(t)}&primary_release_year=${y}&language=en-US`);
    const d=await r.json();let res=d.results||[];
    if(!res.length){const r2=await fetch(`${TMDB_SEARCH}?api_key=${TMDB_KEY}&query=${encodeURIComponent(t)}&language=en-US`);res=(await r2.json()).results||[];}
    let hit=res.find(r=>r.release_date?.startsWith(String(y)));if(!hit&&res.length)hit=res[0];
    _posterCache[filmId]=hit?{poster:hit.poster_path,tmdbId:hit.id}:null;savePCache();return _posterCache[filmId];
  }catch{_posterCache[filmId]=null;return null;}
}

async function loadPoster(filmId,title,year){
  const wrap=document.querySelector(`[data-film="${filmId}"] .card-poster-wrap`);if(!wrap)return;
  const info=await searchTMDB(filmId,title,year);
  const sk=wrap.querySelector('.poster-skeleton');
  if(!info?.poster){if(sk)sk.remove();return;}
  const img=document.createElement('img');img.className='card-poster';img.src=TMDB_IMG_SM+info.poster;img.alt='';
  img.onload=()=>{img.classList.add('loaded');if(sk)sk.remove();};
  img.onerror=()=>{img.remove();if(sk)sk.remove();};
  wrap.appendChild(img);
}

// ── TOAST ────────────────────────────────────────────────────────────────
function showToast(icon,msg){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<span class="toast-icon">${icon}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.classList.add('toast-out');setTimeout(()=>t.remove(),320);},3000);
}

// ── MILESTONES ───────────────────────────────────────────────────────────
const MILESTONES=[25,50,75,100];
let _milestonesSeen=JSON.parse(localStorage.getItem('dp-milestones-v1')||'{}');
function saveMilestones(){localStorage.setItem('dp-milestones-v1',JSON.stringify(_milestonesSeen));}

function checkMilestones(prevSeen){
  ['disney','pixar'].forEach(studio=>{
    const total=studio==='disney'?DISNEY_TOTAL:PIXAR_TOTAL;
    const prevCount=FILMS.filter(f=>f.studio===studio&&prevSeen[f.id]).length;
    const newCount=FILMS.filter(f=>f.studio===studio&&seen[f.id]).length;
    const prevPct=Math.round(prevCount/total*100);
    const newPct=Math.round(newCount/total*100);
    MILESTONES.forEach(m=>{
      const key=`${studio}-${m}`;
      if(newPct>=m&&prevPct<m&&!_milestonesSeen[key]){
        _milestonesSeen[key]=true;saveMilestones();
        const label=studio==='disney'?'Disney':'Pixar';
        const icon=m===100?'🏆':m===75?'🥇':m===50?'🎉':'⭐';
        showToast(icon,`${label} ${m}% concluído!`);
      }
    });
  });
}

function toggleSeen(id){
  const prev={...seen};
  seen[id]=!seen[id];
  if(seen[id]){watchedDates[id]=new Date().toISOString().slice(0,10);skipped[id]=false;}
  else delete watchedDates[id];
  save();saveSkipped();saveDates();
  checkMilestones(prev);
  render();
}
function toggleSkip(id){
  skipped[id]=!skipped[id];
  if(skipped[id]){seen[id]=false;delete watchedDates[id];}
  save();saveSkipped();saveDates();
  render();
}
function toggleSeenFromModal(){if(!currentFilm)return;toggleSeen(currentFilm.id);updateModalBtn(currentFilm);}
function toggleSkipFromModal(){if(!currentFilm)return;toggleSkip(currentFilm.id);updateModalBtn(currentFilm);}

function toggleShowSeen(){
  showSeen=!showSeen;
  document.getElementById('toggle-seen').classList.toggle('active',showSeen);
  document.querySelectorAll('.movie-card.seen').forEach(el=>el.classList.toggle('show-seen',showSeen));
  document.querySelectorAll('.movie-card.skipped').forEach(el=>el.classList.toggle('show-seen',showSeen));
  updateEraEmpty();
}
function updateEraEmpty(){
  document.querySelectorAll('.era-section').forEach(s=>{
    const cards=[...s.querySelectorAll('.movie-card')];
    const all=cards.length>0&&cards.every(c=>c.classList.contains('seen')||c.classList.contains('skipped'));
    const m=s.querySelector('.era-all-seen');if(m)m.style.display=(all&&!showSeen)?'block':'none';
  });
}

function openModal(film){
  currentFilm=film;
  const s=SCORES[film.id]||[null,null,null,null];
  const [runtime,imdb,rtc,rta]=s;

  // studio badge
  const badge=document.getElementById('modal-studio-badge');
  badge.className=`modal-studio-badge ${film.studio}`;
  const badgeSvg=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:14px;height:14px;flex-shrink:0;"><path fill="currentColor" d="${film.studio==='pixar'?PIXAR_PATH:DISNEY_PATH}"/></svg>`;
  badge.innerHTML=badgeSvg+(film.studio==='pixar'?'Pixar Animation Studios':'Walt Disney Animation');

  document.getElementById('modal-title').textContent=film.title;
  const ptEl=document.getElementById('modal-title-pt');
  ptEl.textContent=(film.pt&&film.pt!==film.title)?film.pt:'';

  // tags (year, era, runtime, date watched)
  const tags=document.getElementById('modal-tags');
  let tagsHtml=`<span class="modal-tag">${film.year}</span><span class="modal-tag">${film.eraIcon} ${film.era}</span>`;
  if(runtime){const h=Math.floor(runtime/60),m=runtime%60;tagsHtml+=`<span class="modal-tag">⏱ ${h>0?h+'h ':''} ${m}min</span>`;}
  if(watchedDates[film.id]){
    const d=new Date(watchedDates[film.id]+'T12:00:00');
    const fmt=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
    tagsHtml+=`<span class="modal-tag">✓ Visto em ${fmt}</span>`;
  }
  tags.innerHTML=tagsHtml;

  // scores
  const sw=document.getElementById('modal-scores-wrap');
  const pills=[];
  if(imdb) pills.push(`<div class="score-pill imdb"><span class="si">⭐</span>IMDb <strong>${imdb}</strong></div>`);
  if(rtc!=null) pills.push(`<div class="score-pill rtc"><span class="si">${rtc>=60?'🍅':'💔'}</span>Crítica <strong>${rtc}%</strong></div>`);
  if(rta!=null) pills.push(`<div class="score-pill rta"><span class="si">${rta>=60?'🍿':'💔'}</span>Audiência <strong>${rta}%</strong></div>`);
  sw.innerHTML=pills.length
    ?`<div class="scores-label">Avaliações</div><div class="scores-row">${pills.join('')}</div><div class="scores-source">Fontes: IMDb & Rotten Tomatoes · Mai 2026</div>`
    :`<span class="no-scores">Scores não disponíveis ainda</span>`;

  // poster
  const pe=document.getElementById('modal-poster');
  const ph=document.getElementById('modal-poster-ph');
  const cached=_posterCache[film.id];
  if(cached?.poster){pe.src=TMDB_IMG_LG+cached.poster;pe.style.display='block';ph.style.display='none';}
  else{pe.style.display='none';ph.style.display='flex';
    searchTMDB(film.id,film.title,film.year).then(info=>{
      if(info?.poster){pe.src=TMDB_IMG_LG+info.poster;pe.style.display='block';ph.style.display='none';}
    });
  }

  document.getElementById('modal').className=`modal ${film.studio}-modal`;
  updateModalBtn(film);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function updateModalBtn(film){
  const btn=document.getElementById('modal-seen-btn');
  const skipBtn=document.getElementById('modal-skip-btn');
  const isSeen=!!seen[film.id];
  const isSkipped=!!skipped[film.id];
  btn.className=`modal-seen-btn ${isSeen?'is-seen':'not-seen'} ${film.studio}`;
  btn.textContent=isSeen?'✓ Marcado como visto':'Marcar como visto';
  skipBtn.className=`modal-skip-btn ${isSkipped?'is-skipped':''}`;
  skipBtn.textContent=isSkipped?'⏭ Ignorado':'⏭ Ignorar';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';currentFilm=null;
}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function render(){
  const sd=FILMS.filter(f=>f.studio==='disney'&&seen[f.id]).length;
  const sp=FILMS.filter(f=>f.studio==='pixar'&&seen[f.id]).length;
  document.getElementById('header-sub').textContent=`${FILMS.length} filmes · tracker de progresso`;

  // ── TOP NEXT-UP BANNER ────────────────────────────────────────────────
  const next=FILMS.find(f=>!seen[f.id]&&!skipped[f.id]);
  const topWrap=document.getElementById('next-up-top-wrap');
  if(next){
    const ptText=(next.pt&&next.pt!==next.title)?next.pt:'';
    topWrap.innerHTML=`<div class="next-up" onclick="scrollToNext()" title="Ir para o próximo filme" style="margin-bottom:0;">
      <span class="next-up-badge">▶ Próximo</span>
      <div class="next-up-title">${next.title}<small style="display:block;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:300;font-style:italic;color:var(--text-muted);margin-top:.1rem;">${ptText}</small></div>
      <div class="next-up-meta">
        <span class="next-up-year">${next.year}</span>
        <span class="next-up-studio">${next.studio==='pixar'?'<span style="color:var(--pixar)">● Pixar</span>':'<span style="color:var(--gold)">● Disney</span>'}</span>
      </div>
    </div>`;
  } else {
    topWrap.innerHTML='';
  }

  const main=document.getElementById('main');main.innerHTML='';const toLoad=[];

  // ── ERA SECTIONS ──────────────────────────────────────────────────────
  ERAS.forEach(era=>{
    const films=FILMS.filter(f=>f.era===era.name).sort((a,b)=>a.year-b.year);
    const section=document.createElement('div');section.className='era-section';
    section.innerHTML=`<div class="era-header"><span class="era-emoji">${era.icon}</span>

    const grid=document.createElement('div');grid.className='cards-grid';

    films.forEach(film=>{

      const isSkipped=!!skipped[film.id];
      const card=document.createElement('div');
      card.className=['movie-card',film.studio,
        isSeen?'seen':'',isSeen&&showSeen?'show-seen':'',
        isSkipped?'skipped':'',isSkipped&&showSeen?'show-seen':''
      ].filter(Boolean).join(' ');
      card.dataset.film=film.id;
      const ptHtml=(film.pt&&film.pt!==film.title)?`<div class="card-title-pt">${film.pt}</div>`:'';
      const checkLabel=isSeen?'Visto':isSkipped?'<span style="color:#8070a8">⏭ Ignorado</span>':'Marcar';
      card.innerHTML=`
        <div class="studio-icon ${film.studio}">${film.studio==='pixar'?LAMP_SVG:CASTLE_SVG}</div>
        <div class="card-poster-wrap">
          <div class="poster-skeleton"></div>

        </div>
        <div class="card-body">
          <div class="card-body-text">
            <div class="card-title">${film.title}</div>
            ${ptHtml}
            <div class="card-year">${film.year}</div>
          </div>
          <div class="card-actions">
            <div class="card-seen-btn">
              <div class="checkbox-box">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                  <path d="M1 4L3.5 6.5L9 1" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="checkbox-label">${checkLabel}</span>
            </div>
            <div class="card-skip-btn" title="Ignorar este filme">⏭</div>
            <div class="card-info-btn" title="Ver detalhes">ℹ</div>
          </div>
        </div>`;

      card.querySelector('.card-seen-btn').addEventListener('click',e=>{e.stopPropagation();toggleSeen(film.id);});
      card.querySelector('.card-skip-btn').addEventListener('click',e=>{e.stopPropagation();toggleSkip(film.id);});
      card.querySelector('.card-info-btn').addEventListener('click',e=>{e.stopPropagation();openModal(film);});
      card.addEventListener('click',()=>openModal(film));
      grid.appendChild(card);toLoad.push(film);
    });

    section.appendChild(grid);
    const em=document.createElement('div');em.className='era-all-seen';
    em.textContent='✓ Todos os filmes desta era foram vistos';
    section.appendChild(em);main.appendChild(section);
  });

  // ── UPCOMING ──────────────────────────────────────────────────────────

  up.innerHTML=`<div class="upcoming-title">🔜 Próximos lançamentos confirmados</div>

      <div class="upcoming-chip pixar"><span class="chip-badge">PIX</span><strong>Toy Story 5</strong> · 2026</div>
      <div class="upcoming-chip disney"><span class="chip-badge">DIS</span><strong>Frozen III</strong> · 2027</div>
      <div class="upcoming-chip pixar"><span class="chip-badge">PIX</span><strong>Gatto</strong> · 2027</div>
      <div class="upcoming-chip pixar"><span class="chip-badge">PIX</span><strong>Incredibles 3</strong> · 2028</div>
      <div class="upcoming-chip pixar"><span class="chip-badge">PIX</span><strong>Coco 2</strong> · TBA</div>
    </div>`;
  main.appendChild(up);

  // ── STATS SECTION (bottom) ────────────────────────────────────────────
  const statsEl=document.createElement('div');
  statsEl.id='stats-section';
  statsEl.className='progress-section';
  statsEl.style.cssText='border-top:1px solid var(--border);margin-top:3rem;padding-top:2rem;';

  const pD=Math.round(sd/DISNEY_TOTAL*100);
  const pP=Math.round(sp/PIXAR_TOTAL*100);

  // next-up banner (clickable) — reuses `next` from top of render
  const nextHtml=next?`
    <div class="next-up" id="next-up" onclick="scrollToNext()" title="Ir para o próximo filme">
      <span class="next-up-badge">▶ Próximo</span>
      <div class="next-up-title">${next.title}<small style="display:block;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:300;font-style:italic;color:var(--text-muted);margin-top:.1rem;">${(next.pt&&next.pt!==next.title)?next.pt:''}</small></div>
      <div class="next-up-meta">
        <span class="next-up-year">${next.year}</span>
        <span class="next-up-studio">${next.studio==='pixar'?'<span style="color:var(--pixar)">● Pixar</span>':'<span style="color:var(--gold)">● Disney</span>'}</span>
      </div>
    </div>`:'';

  // era grid
  let eraGridHtml='<div class="era-grid">';
  ERAS.forEach(era=>{
    const films=FILMS.filter(f=>f.era===era.name);
    const done=films.filter(f=>seen[f.id]).length;
    const pct=films.length?Math.round(done/films.length*100):0;
    eraGridHtml+=`<div class="era-stat">
      <div class="era-stat-name">${era.icon} ${era.name}</div>
      <div class="era-stat-count">${done}<span> / ${films.length}</span></div>
      <div class="era-mini-bar"><div class="era-mini-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  eraGridHtml+='</div>';

  statsEl.innerHTML=`
    <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--text-muted);margin-bottom:1.5rem;letter-spacing:.05em;">📊 Estatísticas</div>
    <div class="progress-row">
      <div class="progress-main disney-card">
        <div class="progress-top">
          <span class="progress-label">🏰 Disney</span>
          <div><span class="progress-percent disney-pct">${pD}%</span><span class="progress-count"> · ${sd} de ${DISNEY_TOTAL}</span></div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill disney-fill" style="width:${pD}%"></div></div>
      </div>
      <div class="progress-main pixar-card">
        <div class="progress-top">
          <span class="progress-label">🔵 Pixar</span>
          <div><span class="progress-percent pixar-pct">${pP}%</span><span class="progress-count"> · ${sp} de ${PIXAR_TOTAL}</span></div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill pixar-fill" style="width:${pP}%"></div></div>
      </div>
    </div>
    ${nextHtml}
    ${eraGridHtml}`;
  main.appendChild(statsEl);

  updateEraEmpty();
  toLoad.forEach((film,i)=>setTimeout(()=>loadPoster(film.id,film.title,film.year),i*80));
}

render();
</script>
</body>
</html>
